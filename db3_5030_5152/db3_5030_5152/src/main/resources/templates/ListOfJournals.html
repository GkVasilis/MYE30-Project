<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Available Journals Inventory</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Journals Directory</h1>
    <a href="/homeMenu" class="btn btn-outline-primary">Home Menu</a>
</div>

<table class="table table-bordered table-striped table-hover">
    <thead class="table-dark">
    <tr>
        <th>Journal Name</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="jName : ${Journals}">
        <td th:text="${jName}">Journal Name Text</td>
        <td>
            <a th:href="@{/journalProfile(journalName=${jName})}" class="btn btn-sm btn-primary text-white">View Profile</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
