<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Author Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 th:text="${param.authorName}">Author Name</h1>
  <a href="/listAuthors" class="btn btn-secondary">Back to Authors List</a>
</div>

<div class="row g-3 mb-4">
  <div class="col-md-4">
    <div class="card bg-danger text-center p-3">
      <h6>Active Lifespan Range</h6>
      <h3><span th:text="${firstYear}">2000</span> - <span th:text="${lastYear}">2026</span></h3>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card bg-danger text-center p-3">
      <h6>Total Articles Published</h6>
      <h3 th:text="${authorArticles != null ? authorArticles.size() : 0}">0</h3>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card bg-danger text-center p-3">
      <h6>Average Articles/Year</h6>
      <h3 th:text="${#numbers.formatDecimal(authAvgArticlesByYear, 1, 2)}">0.00</h3>
    </div>
  </div>
</div>

<h3>Complete Bibliography</h3>
<table class="table table-bordered table-striped mt-3">
  <thead class="table-danger">
  <tr>
    <th>Article ID</th>
    <th>Title Text</th>
    <th>Publication Year</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="article : ${authorArticles}">
    <td th:text="${article.article_ID}">ID</td>
    <td th:text="${article.title}">Title</td>
    <td>
      <a th:href="@{/yearProfile(yearValue=${article.published_year})}" th:text="${article.published_year}">Year</a>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
