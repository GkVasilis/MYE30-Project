<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Author Research Profile</title>
  <style>
    body { font-family: sans-serif; margin: 40px; background: #f8f9fa; color: #2d3748; }
    .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    h1 { color: #2b6cb0; margin-bottom: 5px; }
    .meta-timeline { font-size: 14px; color: #718096; margin-bottom: 25px; background: #ebf8ff; padding: 10px 15px; border-radius: 6px; display: inline-block; }
    .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; margin-top: 20px; }
    .stats-box { background: #f7fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 6px; height: fit-content; }
    .metric { margin-bottom: 20px; }
    .metric-val { font-size: 24px; font-weight: bold; color: #2b6cb0; display: block; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #e2e8f0; text-align: left; font-size: 14px; }
    th { background: #edf2f7; color: #4a5568; }
    .btn-back { display: inline-block; margin-bottom: 20px; color: #4a5568; text-decoration: none; font-size: 14px; }
    .btn-back:hover { color: #2b6cb0; }
  </style>
</head>
<body>
<div class="container">
  <a th:href="@{/listAuthors}" class="btn-back">← Back to Authors Index</a>

  <h1 th:text="${param.authorName}">Author Name</h1>

  <div class="meta-timeline">
    Active Publication Timeline:
    <strong th:text="${firstYear}">2000</strong>
    to
    <strong th:text="${lastYear}">2026</strong>
  </div>

  <div class="grid">
    <div class="stats-box">
      <h3>Research Footprint</h3>
      <div class="metric">
        <span class="metric-val" th:text="${authorArticles != null ? authorArticles.size() : 0}">0</span>
        Total Catalogued Articles
      </div>
      <div class="metric">
        <span class="metric-val" th:text="${authAvgArticlesByYear}">0</span>
        Avg Publications / Year
      </div>
    </div>

    <div>
      <h3>Authored Works Index</h3>
      <table>
        <thead>
        <tr>
          <th>Article ID</th>
          <th>Title</th>
          <th>Year</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="article : ${authorArticles}">
          <td th:text="${article.article_ID}">ID</td>
          <td th:text="${article.title}" style="font-weight: 500;">Title</td>
          <td th:text="${article.year}">2026</td>
        </tr>
        <tr th:if="${authorArticles == null || authorArticles.isEmpty()}">
          <td colspan="3" style="text-align: center; color: #a0aec0;">No works registered for this researcher.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
