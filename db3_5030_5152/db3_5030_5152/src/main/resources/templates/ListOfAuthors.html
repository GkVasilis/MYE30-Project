<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Authors Index</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Authors Directory</h1>
  <a href="/homeMenu" class="btn btn-outline-danger">Home Menu</a>
</div>

<table class="table table-striped table-hover">
  <thead class="table-dark">
  <tr>
    <th>Author Name</th>
    <th style="width: 150px;">Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="aName : ${Authors}">
    <td th:text="${aName}">Author Name Text</td>
    <td>
      <a th:href="@{/authorProfile(authorName=${aName})}" class="btn btn-sm btn-danger">View Profile</a>
    </td>
  </tr>
  </tbody>
</table>

<div class="d-flex justify-content-center mt-4" th:if="${totalPages > 0}">
  <nav aria-label="Page navigation">
    <ul class="pagination">

      <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
        <a class="page-link text-danger" th:href="@{/listAuthors(page=${currentPage - 1})}">Previous</a>
      </li>

      <li class="page-item disabled">
        <span class="page-link" th:text="'Page ' + (${currentPage + 1}) + ' from ' + ${totalPages}">Page 1 from 1</span>
      </li>

      <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
        <a class="page-link text-danger" th:href="@{/listAuthors(page=${currentPage + 1})}">Next</a>
      </li>

    </ul>
  </nav>
</div>
</body>
</html>
