<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Data Analysis Timeline Trends</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="container py-4">
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Historical Trend Charts (D3-Mapped Data Array)</h1>
  <a href="/homeMenu" class="btn btn-secondary">Home Menu</a>
</div>

<div class="card mb-4">
  <div class="card-header bg-dark text-white">Interactive Trend Query Filter Engine</div>
  <div class="card-body">
    <form action="/lineCharts" method="get" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Query Entries (Comma Separated)</label>
        <input type="text" name="journalNames" th:value="${#strings.listJoin(selectedJournals, ',')}" class="form-control" placeholder="Type Journal Names...">
      </div>
      <div class="col-md-3">
        <label class="form-label">Start Boundary (Min Year)</label>
        <input type="number" name="minYear" th:value="${minYear}" class="form-control" placeholder="Min Year">
      </div>
      <div class="col-md-3">
        <label class="form-label">End Boundary (Max Year)</label>
        <input type="number" name="maxYear" th:value="${maxYear}" class="form-control" placeholder="Max Year">
      </div>
      <div class="col-12 text-end">
        <button type="submit" class="btn btn-primary">Generate Analytical Trendline Plot</button>
      </div>
    </form>
  </div>
</div>

<div class="card p-3 shadow-sm">
  <canvas id="timeSeriesChart" style="max-height: 500px;"></canvas>
</div>

<script th:inline="javascript">
  // Injecting serialized dataset safely straight out of Thymeleaf Model attribute engine
  const rawJsonData = /*[[${chartDataJson}]]*/ '[]';
  const parsedDataset = JSON.parse(rawJsonData);

  // Transform flat object data mappings into segmented distinct label array lists
  const groups = {};
  const uniqueYearsSet = new Set();

  parsedDataset.forEach(item => {
    if(!groups[item.name]) groups[item.name] = [];
    groups[item.name].push({ x: item.years, y: item.number });
    uniqueYearsSet.add(item.years);
  });

  const distinctSortedTimelineLabels = Array.from(uniqueYearsSet).sort((a,b) => a - b);

  const configurationsDatasetsArray = Object.keys(groups).map((key, index) => {
    // Sort data chronological inside the group
    groups[key].sort((a,b) => a.x - b.x);

    return {
      label: key,
      data: groups[key],
      parsing: { xAxisKey: 'x', yAxisKey: 'y' },
      borderWidth: 2.5,
      tension: 0.15,
      borderColor: `hsl(${(index * 135) % 360}, 70%, 50%)`
    };
  });

  // Initialize display configuration layout elements
  const htmlCanvasContext = document.getElementById('timeSeriesChart').getContext('2d');
  new Chart(htmlCanvasContext, {
    type: 'line',
    data: { datasets: configurationsDatasetsArray },
    options: {
      responsive: true,
      scales: {
        x: { type: 'linear', title: { display: true, text: 'Timeline Interval Span (Years)' }, ticks: { stepSize: 1 } },
        y: { title: { display: true, text: 'Calculated Aggregate Quantities Volume' } }
      }
    }
  });
</script>
</body>
</html>
