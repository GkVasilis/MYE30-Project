<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Years Index</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Years Directory</h1>
  <a href="/homeMenu" class="btn btn-outline-warning">Home Menu</a>
</div>

<div class="row row-cols-2 row-cols-md-4 g-3">
  <div class="col" th:each="year : ${Years}">
    <div class="card text-center h-100 shadow-sm">
      <div class="card-body d-flex flex-column justify-content-between">
        <h4 class="card-title text-muted" th:text="${year}">2026</h4>
        <a th:href="@{/yearProfile(yearValue=${year})}" class="btn btn-sm btn-outline-secondary mt-2">Annual Metrics</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
