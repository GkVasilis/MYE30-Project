<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Conferences Index</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Conferences Directory</h1>
  <a href="/homeMenu" class="btn btn-outline-success">Home Menu</a>
</div>

<table class="table table-striped table-hover">
  <thead class="table-dark">
  <tr>
    <th>Conference Name</th>
    <th style="width: 150px;">Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="cName : ${Conferences}">
    <td th:text="${cName}">Conference Name Text</td>
    <td>
      <a th:href="@{/conferenceProfile(conferenceName=${cName})}" class="btn btn-sm btn-success">View Profile</a>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
