<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Comparative Bar Chart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="container py-4">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Comparative Data Distribution (Grouped Metrics)</h1>
    <a href="/homeMenu" class="btn btn-secondary">Home Menu</a>
</div>

<div class="card mb-4">
    <div class="card-header bg-secondary text-white">Target Entity Comparator Selector Form</div>
    <div class="card-body">
        <form action="/groupedBarCharts" method="get" class="row g-3">
            <div class="col-md-10">
                <label class="form-label">Target Names (Comma-Separated Array Strings)</label>
                <input type="text" name="journalNames" th:value="${#strings.listJoin(selectedJournals, ',')}" class="form-control" placeholder="e.g. Journal of Computer Science, Journal of AI">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Draw Metrics Bar Graph</button>
            </div>
        </form>
    </div>
</div>

<div class="card p-3 shadow-sm">
    <canvas id="groupedBarChartElement" style="max-height: 480px;"></canvas>
</div>

<script th:inline="javascript">
    const rawBarJsonString = /*[[${barChartDataJson}]]*/ '[]';
    const barRawDataArray = JSON.parse(rawBarJsonString);

    // Grouping logic for categories
    const distinctEntities = Array.from(new Set(barRawDataArray.map(item => item.state)));
    const distinctMetricTypes = Array.from(new Set(barRawDataArray.map(item => item.age)));

    // Organize into structures mapping parameters out cleanly
    const structureMapDatasets = distinctMetricTypes.map((metricName, colorIdx) => {
        return {
            label: metricName,
            data: distinctEntities.map(entityKey => {
                const matchedNode = barRawDataArray.find(d => d.state === entityKey && d.age === metricName);
                return matchedNode ? matchedNode.population : 0;
            }),
            backgroundColor: `hsla(${(colorIdx * 110) % 360}, 65%, 55%, 0.85)`
        };
    });

    const chartCanvasTarget = document.getElementById('groupedBarChartElement').getContext('2d');
    new Chart(chartCanvasTarget, {
        type: 'bar',
        data: {
            labels: distinctEntities,
            datasets: structureMapDatasets
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'top' } },
            scales: {
                y: { beginAtZero: true, title: { display: true, text: 'Metric Scaling Axis Units' } }
            }
        }
    });
</script>
</body>
</html>
